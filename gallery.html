<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galería</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap"
    rel="stylesheet"
  />
  <script src="eventos.js"></script>

  <style>
    :root {
      --color-principal: #7A2E4B;
      --color-fondo:     #FDF5F8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--color-fondo);
      color: #2d2d2d;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      background: var(--color-principal);
      color: #fff;
      text-align: center;
      padding: 2.5rem 1.5rem 2rem;
    }
    header .emoji { font-size: 2.5rem; display: block; margin-bottom: .5rem; }
    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 600;
    }
    header p.subtitulo {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      opacity: .9;
      margin-top: .4rem;
    }
    header p.contador {
      font-size: .85rem;
      font-weight: 300;
      opacity: .75;
      margin-top: .5rem;
      letter-spacing: .05em;
    }

    /* ── GRID ───────────────────────────────────────────── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 4px;
      padding: 8px;
      max-width: 900px;
      margin: 1.5rem auto 2rem;
    }

    .foto-item {
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 6px;
      cursor: pointer;
      background: #e0e0e0;
      transition: transform .15s;
    }
    .foto-item:hover { transform: scale(1.02); }
    .foto-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── ESTADOS ────────────────────────────────────────── */
    .estado {
      text-align: center;
      padding: 3rem 2rem;
      color: #888;
    }
    .estado .icon { font-size: 2.5rem; display: block; margin-bottom: 1rem; }
    .estado p { font-size: 1rem; line-height: 1.6; }

    #loading-skeleton {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 4px;
      padding: 8px;
      max-width: 900px;
      margin: 1.5rem auto;
    }
    .skeleton {
      aspect-ratio: 1;
      border-radius: 6px;
      background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── BOTÓN SUBIR FOTO ───────────────────────────────── */
    .fab {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      background: var(--color-principal);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: .85rem 1.5rem;
      font-size: .95rem;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,.25);
      display: none;
      transition: opacity .2s;
      text-decoration: none;
    }
    .fab:hover { opacity: .88; }

    /* ── LIGHTBOX ───────────────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    #lightbox.open { display: flex; }

    #lightbox-img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 8px;
      object-fit: contain;
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
    }

    #lightbox-close {
      position: fixed;
      top: 1rem;
      right: 1.2rem;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      opacity: .8;
    }
    #lightbox-close:hover { opacity: 1; }

    #lightbox-nav-prev,
    #lightbox-nav-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,.15);
      border: none;
      color: #fff;
      font-size: 2rem;
      padding: .5rem 1rem;
      cursor: pointer;
      border-radius: 6px;
      transition: background .2s;
    }
    #lightbox-nav-prev { left: .5rem; }
    #lightbox-nav-next { right: .5rem; }
    #lightbox-nav-prev:hover,
    #lightbox-nav-next:hover { background: rgba(255,255,255,.3); }

    footer {
      padding: 1.5rem;
      font-size: .75rem;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>

<body>

  <header id="header" style="display:none">
    <span class="emoji" id="h-emoji"></span>
    <h1 id="h-nombre"></h1>
    <p class="subtitulo" id="h-subtitulo"></p>
    <p class="contador" id="h-contador"></p>
  </header>

  <!-- Esqueleto mientras carga -->
  <div id="loading-skeleton">
    <div class="skeleton"></div><div class="skeleton"></div>
    <div class="skeleton"></div><div class="skeleton"></div>
    <div class="skeleton"></div><div class="skeleton"></div>
  </div>

  <!-- Grid de fotos -->
  <div id="grid" style="display:none"></div>

  <!-- Estado vacío / error -->
  <div id="estado-vacio" class="estado" style="display:none">
    <span class="icon">📷</span>
    <p>Aún no hay fotos.<br>¡Sé el primero en compartir un momento!</p>
  </div>
  <div id="estado-error" class="estado" style="display:none">
    <span class="icon">❌</span>
    <p id="error-txt">No se pudieron cargar las fotos.</p>
  </div>

  <!-- FAB (botón flotante) para subir foto -->
  <a class="fab" id="fab" href="">📷 Subir foto</a>

  <!-- Lightbox -->
  <div id="lightbox">
    <button id="lightbox-close">✕</button>
    <button id="lightbox-nav-prev">‹</button>
    <img id="lightbox-img" src="" alt="" />
    <button id="lightbox-nav-next">›</button>
  </div>

  <footer>NFC Eventos &copy; 2026</footer>

  <script>
    // ── 1. Detectar evento ────────────────────────────────
    const params    = new URLSearchParams(window.location.search);
    const eventoKey = params.get('evento') || EVENTO_DEFAULT;
    const evento    = EVENTOS[eventoKey];

    if (!evento) {
      document.getElementById('loading-skeleton').style.display = 'none';
      document.getElementById('estado-error').style.display     = 'block';
      document.getElementById('error-txt').textContent          = 'Evento no encontrado. Comprueba el enlace.';
    } else {
      // ── 2. Aplicar colores ──────────────────────────────
      document.documentElement.style.setProperty('--color-principal', evento.color);
      document.documentElement.style.setProperty('--color-fondo',     evento.colorFondo);
      document.title = 'Galería — ' + evento.nombre;

      // ── 3. Rellenar header ──────────────────────────────
      document.getElementById('h-emoji').textContent    = evento.emoji;
      document.getElementById('h-nombre').textContent   = evento.nombre;
      document.getElementById('h-subtitulo').textContent = evento.mensajeGaleria;
      document.getElementById('header').style.display   = '';

      // FAB → enlaza a index.html con el mismo evento
      const fab = document.getElementById('fab');
      fab.href = 'index.html?evento=' + eventoKey;

      // ── 4. Cargar fotos ─────────────────────────────────
      cargarFotos();
    }

    async function cargarFotos() {
      try {
        const res = await fetch('/.netlify/functions/photos?evento=' + eventoKey);
        const data = await res.json();

        document.getElementById('loading-skeleton').style.display = 'none';

        if (!res.ok) throw new Error(data.error || 'Error del servidor');

        const fotos = data.photos || [];

        // Actualizar contador
        document.getElementById('h-contador').textContent =
          fotos.length === 0 ? 'Sin fotos aún' :
          fotos.length === 1 ? '1 foto compartida' :
          fotos.length + ' fotos compartidas';

        if (fotos.length === 0) {
          document.getElementById('estado-vacio').style.display = 'block';
          document.getElementById('fab').style.display          = 'block';
          return;
        }

        // Construir grid
        const grid = document.getElementById('grid');
        grid.style.display = '';

        fotos.forEach((foto, idx) => {
          const item = document.createElement('div');
          item.className = 'foto-item';

          const img = document.createElement('img');
          // Versión pequeña para el grid (transformación Cloudinary)
          img.src = foto.url.replace('/upload/', '/upload/w_300,h_300,c_fill,q_auto,f_auto/');
          img.alt = 'Foto ' + (idx + 1);
          img.loading = 'lazy';

          item.appendChild(img);
          item.addEventListener('click', () => abrirLightbox(idx));
          grid.appendChild(item);
        });

        document.getElementById('fab').style.display = 'block';

        // ── 5. Lightbox ─────────────────────────────────────
        let currentIdx = 0;

        function abrirLightbox(idx) {
          currentIdx = idx;
          document.getElementById('lightbox-img').src = fotos[idx].url;
          document.getElementById('lightbox').classList.add('open');
          document.body.style.overflow = 'hidden';
        }

        function cerrarLightbox() {
          document.getElementById('lightbox').classList.remove('open');
          document.body.style.overflow = '';
        }

        document.getElementById('lightbox-close').addEventListener('click', cerrarLightbox);
        document.getElementById('lightbox').addEventListener('click', e => {
          if (e.target === document.getElementById('lightbox')) cerrarLightbox();
        });

        document.getElementById('lightbox-nav-prev').addEventListener('click', e => {
          e.stopPropagation();
          currentIdx = (currentIdx - 1 + fotos.length) % fotos.length;
          document.getElementById('lightbox-img').src = fotos[currentIdx].url;
        });

        document.getElementById('lightbox-nav-next').addEventListener('click', e => {
          e.stopPropagation();
          currentIdx = (currentIdx + 1) % fotos.length;
          document.getElementById('lightbox-img').src = fotos[currentIdx].url;
        });

        // Swipe en móvil
        let touchStartX = 0;
        document.getElementById('lightbox').addEventListener('touchstart', e => {
          touchStartX = e.changedTouches[0].screenX;
        });
        document.getElementById('lightbox').addEventListener('touchend', e => {
          const diff = touchStartX - e.changedTouches[0].screenX;
          if (Math.abs(diff) > 50) {
            currentIdx = diff > 0
              ? (currentIdx + 1) % fotos.length
              : (currentIdx - 1 + fotos.length) % fotos.length;
            document.getElementById('lightbox-img').src = fotos[currentIdx].url;
          }
        });

        // Teclas
        document.addEventListener('keydown', e => {
          if (!document.getElementById('lightbox').classList.contains('open')) return;
          if (e.key === 'Escape')      cerrarLightbox();
          if (e.key === 'ArrowRight')  { currentIdx = (currentIdx + 1) % fotos.length; document.getElementById('lightbox-img').src = fotos[currentIdx].url; }
          if (e.key === 'ArrowLeft')   { currentIdx = (currentIdx - 1 + fotos.length) % fotos.length; document.getElementById('lightbox-img').src = fotos[currentIdx].url; }
        });

        // Hacer la función global para que los items del grid la puedan usar
        window.abrirLightbox = abrirLightbox;

      } catch (err) {
        document.getElementById('loading-skeleton').style.display = 'none';
        document.getElementById('estado-error').style.display     = 'block';
        document.getElementById('error-txt').textContent          = 'No se pudieron cargar las fotos. ' + err.message;
        document.getElementById('fab').style.display              = 'block';
      }
    }
  </script>

</body>
</html>
